name: Book examples

on:
  push:
    paths:
      - 'book/**'
  pull_request:
    paths:
      - 'book/**'

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r book/requirements.txt
      - name: Run example smoke tests
        run: python book/tests/run_examples.py
