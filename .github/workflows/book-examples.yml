name: Book CI

on:
  push:
    paths:
      - 'book/**'
      - 'README.md'
      - 'pyproject.toml'
      - '.github/workflows/book-examples.yml'
  pull_request:
    paths:
      - 'book/**'
      - 'README.md'
      - 'pyproject.toml'
      - '.github/workflows/book-examples.yml'

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dev dependencies
        run: pip install -r book/requirements-dev.txt
      - name: Check Python formatting (black)
        run: python -m black --check book/
      - name: Lint Python (ruff)
        run: python -m ruff check book/
      - name: Check file structure (lines, requirements)
        run: python book/scripts/check_formatting.py
      - name: Check representation lens sections
        run: python book/scripts/check_representation_lens.py

  examples:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install -r book/requirements.txt
      - name: Run example smoke tests
        run: python book/tests/run_examples.py
      - name: Run correctness tests
        run: python book/tests/test_correctness.py
      - name: Verify exercise solutions
        run: python book/solutions/run_verifications.py
      - name: Teaching pilot pre-flight (Run 1 materials)
        run: python book/scripts/run_pilot_preflight.py
      - name: Governance script tests
        run: python book/tests/test_governance.py

  html:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Install Python dependencies
        run: pip install -r book/requirements.txt
      - name: Generate figures
        run: python book/tests/run_examples.py
      - name: Build HTML
        working-directory: book
        run: make html
      - name: Verify HTML output
        run: test -s book/audio_signal_processing.html
      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-html
          path: book/audio_signal_processing.html
          if-no-files-found: error

  pdf:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc \
            texlive-latex-base texlive-latex-recommended \
            texlive-fonts-recommended texlive-latex-extra
      - name: Install Python dependencies
        run: pip install -r book/requirements.txt
      - name: Generate figures
        run: python book/tests/run_examples.py
      - name: Build PDF
        working-directory: book
        run: make pdf
      - name: Verify PDF output
        run: test -s book/audio_signal_processing.pdf
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-pdf
          path: book/audio_signal_processing.pdf
          if-no-files-found: error

  epub:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Install Python dependencies
        run: pip install -r book/requirements.txt
      - name: Generate figures
        run: python book/tests/run_examples.py
      - name: Build EPUB
        working-directory: book
        run: make epub
      - name: Verify EPUB output
        run: test -s book/audio_signal_processing.epub
      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-epub
          path: book/audio_signal_processing.epub
          if-no-files-found: error
