name: Book CI

on:
  push:
    paths:
      - 'book/**'
  pull_request:
    paths:
      - 'book/**'

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install -r book/requirements.txt
      - name: Run example smoke tests
        run: python book/tests/run_examples.py

  html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Build HTML
        working-directory: book
        run: make html
      - name: Verify HTML output
        run: test -s book/audio_signal_processing.html
